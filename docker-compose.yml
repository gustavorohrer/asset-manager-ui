version: '3.8'

services:
  backend-mock:
    image: mockserver/mockserver:5.15.0
    container_name: ecl-backend-mock
    ports:
      - "8080:8080"
    environment:
      - MOCKSERVER_WATCH_INITIALIZATION_JSON=true
      - MOCKSERVER_PROPERTY_FILE=/config/mockserver.properties
      - MOCKSERVER_INITIALIZATION_JSON_PATH=/config/expectations.json
    volumes:
      - ./backend-mock/expectations.json:/config/expectations.json
      - ./backend-mock/mockserver.properties:/config/mockserver.properties
    command: -serverPort 8080 -logLevel INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s